################
### MONITORS ###
################

monitor=,preferred,auto,1

###################
### MY PROGRAMS ###
###################

$terminal = kitty
$fileManager = kitty -e yazi
$menu = rofi -show drun


#################
### AUTOSTART ###
#################

# Core components
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = swww-daemon
exec-once = swww img /home/gre/Wallpaper/4.png
exec-once = waybar
exec-once = dunst
exec-once = nm-applet --indicator
exec-once = swaync
exec-once = swayosd-server 
exec-once = udiskie &
exec-once = hyprpaper

# Clipboard Manager
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store


#############################
### ENVIRONMENT VARIABLES ###
#############################

# Cursor
env = X_SIZE,24
env = HYPRCURSOR_SIZE,24

# --- DARK MODE ENFORCER 
env = GTK_THEME,Adwaita-dark
env = QT_QPA_PLATFORMTHEME,qt6ct
env = QT_STYLE_OVERRIDE,kvantum 

# --- NVIDIA SPECIFIC 
env = LIBVA_DRIVER_NAME,nvidia
env = XDG_SESSION_TYPE,wayland
env = GBM_BACKEND,nvidia-drm
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
# Agar aplikasi Electron (VSCode, Discord, dll) jalan native di Wayland
env = ELECTRON_OZONE_PLATFORM_HINT,auto


# ── LOOK AND FEEL ───────────────────────────────────────────────────
general {
    gaps_in = 5
    gaps_out = 20

    border_size = 2
    col.active_border = rgba(c8c8c8dd)
    col.inactive_border = rgba(595959aa)

    resize_on_border = false
    allow_tearing = false
    layout = dwindle
}

# ── DECORATION ──────────────────────────────────────────────────────
decoration {
    rounding = 5
    rounding_power = 2

    active_opacity = 1
    inactive_opacity = 1

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }


     blur {
        enabled = yes
        size = 2
        passes = 3
        new_optimizations = on
        popups = false
        ignore_opacity = on 
        xray = false
    }
}

# ── ANIMATIONS ──────────────────────────────────────────────────────
animations {
    enabled = yes
    bezier = wind, 0.05, 0.9, 0.1, 1.05
    bezier = winIn, 0.1, 1.1, 0.1, 1.1
    bezier = winOut, 0.3, -0.3, 0, 1
    bezier = liner, 1, 1, 1, 1
    animation = windows, 1, 6, wind, slide
    animation = windowsIn, 1, 6, winIn, slide
    animation = windowsOut, 1, 5, winOut, slide
    animation = windowsMove, 1, 5, wind, slide
    animation = border, 1, 1, liner
    animation = borderangle, 1, 30, liner, once
    animation = fade, 1, 10, default
    animation = workspaces, 1, 5, wind
    animation = specialWorkspace, 1, 5, wind, slidevert
}

# ── LAYOUTS ─────────────────────────────────────────────────────────
dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
}


#############
### INPUT ###
#############

input {
    kb_layout = us
    follow_mouse = 1

    touchpad {
        natural_scroll = true   # Scroll dua jari: Atas = konten ke atas (seperti HP)
        scroll_factor = 0.9     # Kecepatan scroll touchpad
    }

    sensitivity = 0
}



###################
### KEYBINDINGS ###
###################

$mainMod = SUPER

# Apps
bind = $mainMod, RETURN, exec, $terminal
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, B, exec, firefox
bind = $mainMod, D, exec, $menu
bind = $mainMod, V, exec, cliphist list | rofi -dmenu | cliphist decode | wl-copy # Clipboard history
bind = $mainMod, C, exec, code # VSCode
bind = $mainMod, W, exec, ~/.config/hypr/scripts/wallpaper.sh

# Window Management
bind = $mainMod, Q, killactive,
bind = $mainMod, F, togglefloating,
bind = $mainMod, G, fullscreen,
bind = $mainMod, P, pseudo,
bind = $mainMod, J, togglesplit,
bind = $mainMod SHIFT, L, exec, hyprlock  # Lock Screen

# Screenshot
bind = $mainMod SHIFT, S, exec, grim -g "$(slurp)" ~/Pictures/Screenshots/Screenshot_$(date +%Y-%m-%d_%H-%M-%S).png
bind = , Print, exec, grim -g "$(slurp)" - | wl-copy # PrtSc untuk copy ke clipboard

# Move Focus
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus,

# Workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5

# Move Window to Workspace
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5

# Scroll Workspace
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/Resize Window (Mouse)
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# --- TOMBOL KHUSUS ASUS TUF ---

# 1. Tombol ROG -> Buka Menu Power
bind = , XF86Launch1, exec, wlogout
bind = , XF86Launch4, exec, wlogout
bind = $mainMod, DELETE, exec, wlogout # Backup shortcut

bind = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.5 @DEFAULT_AUDIO_SINK@ 5%+
bind = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

# 3. Tombol Kecerahan Layar (F7/F8)
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 5%-
bindel = , XF86MonBrightnessUp, exec, brightnessctl set 5%+

# 4. Tombol Lampu Keyboard (Fn+F2/F3)
bindel = , XF86KbdBrightnessDown, exec, brightnessctl -d *::kbd_backlight set 1-
bindel = , XF86KbdBrightnessUp, exec, brightnessctl -d *::kbd_backlight set +1

# 5. Capslock Indicator
bindl = , Caps_Lock, exec, swayosd-client --caps-lock

#ganti wallpaper
bind = SUPER, W, exec, ~/.config/hypr/scripts/wallpaper.sh

#screenshot
bind = , Print, exec, grim ~/Pictures/screenshot_$(date +%F-%T).png
bind = SHIFT, Print, exec, grim -g "$(slurp)" ~/Pictures/screenshot_$(date +%F-%T).png



# ######## Window rules ########

windowrule = opacity 0.6 override 0.6 override, class:.* # Applies transparency to EVERY WINDOW
windowrulev2 = tile, class:(dev.warp.Warp)
windowrulev2 = float, title:^([Pp]icture[-\s]?[Ii]n[-\s]?[Pp]icture)(.*)$
windowrule = center, title:^(Open File)(.*)$
windowrule = center, title:^(Select a File)(.*)$
windowrule = center, title:^(Choose wallpaper)(.*)$
windowrule = center, title:^(Open Folder)(.*)$
windowrule = center, title:^(Save As)(.*)$
windowrule = center, title:^(Library)(.*)$
windowrule = center, title:^(File Upload)(.*)$

windowrulev2 = float, title:^(Free Download Manager)(.*)$
windowrulev2 = float, title:^(Windscribe)(.*)$
windowrulev2 = float, title:^(wdisplays)(.*)$
windowrulev2 = float, title:^(Telegram)(.*)$
windowrulev2 = float, title:^(LocalSend)(.*)$

# Picture-in-Picture
windowrulev2 = keepaspectratio, title:^(Picture(-| )in(-| )[Pp]icture)$
windowrulev2 = move 73% 72%,title:^(Picture(-| )in(-| )[Pp]icture)$ 
windowrulev2 = size 25%, title:^(Picture(-| )in(-| )[Pp]icture)$
windowrulev2 = float, title:^(Picture(-| )in(-| )[Pp]icture)$
windowrulev2 = pin, title:^(Picture(-| )in(-| )[Pp]icture)$

# Dialogs
windowrule=float,title:^(Open File)(.*)$
windowrule=float,title:^(Select a File)(.*)$
windowrule=float,title:^(Choose wallpaper)(.*)$
windowrule=float,title:^(Open Folder)(.*)$
windowrule=float,title:^(Save As)(.*)$
windowrule=float,title:^(Library)(.*)$
windowrule=float,title:^(File Upload)(.*)$

# Tearing
##### windowrule=immediate,.*\.exe
windowrulev2=immediate,class:(steam_app)

# ######## Layer rules ########
layerrule = xray 1, .*
# layerrule = noanim, .*
layerrule = noanim, walker
layerrule = noanim, selection
layerrule = noanim, overview
layerrule = noanim, anyrun
layerrule = noanim, indicator.*
layerrule = noanim, osk
layerrule = noanim, hyprpicker
layerrule = blur, shell:*
layerrule = ignorealpha 0.6, shell:*

layerrule = noanim, noanim
layerrule = blur, gtk-layer-shell
layerrule = ignorezero, gtk-layer-shell
layerrule = blur, launcher
layerrule = ignorealpha 0.5, launcher
layerrule = blur, notifications
layerrule = ignorealpha 0.69, notifications

# ags
layerrule = animation slide top, sideleft.*
layerrule = animation slide top, sideright.*
layerrule = blur, session

layerrule = blur, bar
layerrule = ignorealpha 0.6, bar
layerrule = blur, corner.*
layerrule = ignorealpha 0.6, corner.*
layerrule = blur, dock
layerrule = ignorealpha 0.6, dock
layerrule = blur, indicator.*
layerrule = ignorealpha 0.6, indicator.*
layerrule = blur, overview
layerrule = ignorealpha 0.6, overview
layerrule = blur, cheatsheet
layerrule = ignorealpha 0.6, cheatsheet
layerrule = blur, sideright
layerrule = ignorealpha 0.6, sideright
layerrule = blur, sideleft
layerrule = ignorealpha 0.6, sideleft
layerrule = blur, indicator*
layerrule = ignorealpha 0.6, indicator*
layerrule = blur, osk
layerrule = ignorealpha 0.6, osk
